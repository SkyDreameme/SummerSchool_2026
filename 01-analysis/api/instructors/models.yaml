openapi: 3.0.3
info:
  title: Instructors Models
  version: 1.0.0

components:
  schemas:
    CreateRatingRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Звёзды 1..5 (FR-14, SCR-008)

    MarshalRating:
      type: object
      required: [slotId, clientId, rating, createdAt]
      properties:
        slotId:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        createdAt:
          type: string
          format: date-time